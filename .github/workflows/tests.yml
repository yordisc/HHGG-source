name: Tests

on:
  push:
  pull_request:

jobs:
  laravel-tests:
    name: Laravel tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.4"
            experimental: false
          - php: "8.2"
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        if: matrix.php == '8.4'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests
        if: matrix.php == '8.4'
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
          ADMIN_ACCESS_KEY: test-admin-key
        run: php artisan test -v

      - name: Skip unsupported version
        if: matrix.php == '8.2'
        run: echo "Skipping tests on PHP 8.2 because composer.lock currently requires PHP >= 8.4"
