name: Tests

on:
  push:
  pull_request:

jobs:
  laravel-tests:
    name: Laravel tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.4"
            experimental: false
          - php: "8.2"
            experimental: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: certificados_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ularavel -psecret --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, pdo_mysql
          coverage: none

      - name: Install dependencies
        if: matrix.php == '8.4'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests
        if: matrix.php == '8.4'
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: certificados_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
          ADMIN_ACCESS_KEY: test-admin-key
        run: php artisan test

      - name: Skip unsupported version
        if: matrix.php == '8.2'
        run: echo "Skipping tests on PHP 8.2 because composer.lock currently requires PHP >= 8.4"
