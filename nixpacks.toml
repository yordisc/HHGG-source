# ─────────────────────────────────────────────────────────────────────────────
# nixpacks.toml — Configuración de despliegue para Railway
# Railway usa Nixpacks para construir y ejecutar la aplicación automáticamente.
# Este archivo le dice a Railway exactamente qué instalar y cómo arrancar.
# ─────────────────────────────────────────────────────────────────────────────

[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.bcmath",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.gd",
  "php82Extensions.zip",
  "php82Extensions.intl",
  "php82Extensions.tokenizer",
  "php82Extensions.ctype",
  "php82Extensions.fileinfo",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
# Ejecuta migraciones automáticamente en cada deploy, luego arranca el servidor
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
